<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Getting Started</title>
</head>
<body>
<ul>
  <li>Open an <code>.sh</code> file or <code>.md</code> file containing a shell code block (<code>shell</code>,
    <code>bash</code>, <code>zsh</code>, <code>sh</code>).
  </li>
  <li>Place the caret on a line, or select multiple lines.</li>
  <li>Press <kbd>Command</kbd> + <kbd>Enter</kbd>.</li>
</ul>
<br>
<p><strong>Note:</strong> The selected content will be executed in the active macOS Terminal window
  (or a new one if none is active).</p>
</body>
</html>
